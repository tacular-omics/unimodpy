<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UNIMOD Browser — unimodpy</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh;font-size:14px}
a{color:#3b82f6;text-decoration:none}
a:hover{text-decoration:underline}
code{font-family:ui-monospace,"SFMono-Regular",Menlo,monospace;font-size:.9em}
header{background:#1e293b;color:#f8fafc;padding:1.25rem 1.5rem}
.hi{max-width:1300px;margin:0 auto;display:flex;gap:1rem;justify-content:space-between;flex-wrap:wrap;align-items:flex-start}
h1{font-size:1.6rem;font-weight:700;letter-spacing:-.03em}
.sub{color:#94a3b8;font-size:.85rem;margin-top:.2rem}
.hm{display:flex;align-items:center;gap:.4rem;margin-top:.6rem;flex-wrap:wrap}
.ct{background:#3b82f6;color:#fff;font-size:.75rem;font-weight:700;padding:.15rem .55rem;border-radius:999px}
.pl{background:#334155;color:#cbd5e1;font-size:.75rem;padding:.15rem .55rem;border-radius:999px}
.pl:hover{background:#475569;text-decoration:none;color:#f8fafc}
.rel{color:#94a3b8;font-size:.8rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;align-self:flex-end}
.rel a{color:#93c5fd}
main{max-width:1300px;margin:1rem auto;padding:0 1rem}
.tb{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem}
.tb input[type=search]{flex:1;min-width:180px;padding:.5rem .75rem;border:1px solid #d1d5db;border-radius:.5rem;font-size:.875rem;background:#fff;outline:none;color:#1a202c}
.tb input[type=search]:focus{border-color:#3b82f6;box-shadow:0 0 0 3px #dbeafe80}
.tb select{padding:.45rem .65rem;border:1px solid #d1d5db;border-radius:.5rem;font-size:.8rem;background:#fff;outline:none;cursor:pointer;color:#374151}
.tb select:focus{border-color:#3b82f6}
.bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;flex-wrap:wrap;gap:.4rem}
.rc{font-size:.8rem;color:#6b7280}
.pc{display:flex;align-items:center;gap:.4rem}
.pc select{padding:.3rem .5rem;border:1px solid #d1d5db;border-radius:.4rem;font-size:.8rem;background:#fff;cursor:pointer}
.pc button{padding:.3rem .65rem;border:1px solid #d1d5db;background:#fff;border-radius:.4rem;cursor:pointer;font-size:.8rem;color:#374151;line-height:1.2}
.pc button:hover:not(:disabled){background:#f9fafb;border-color:#9ca3af}
.pc button:disabled{opacity:.35;cursor:default}
.pi{font-size:.8rem;color:#6b7280;min-width:60px;text-align:center}
.tw{background:#fff;border:1px solid #e5e7eb;border-radius:.75rem;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.84rem}
thead{background:#f9fafb}
th{padding:.65rem .9rem;text-align:left;font-weight:600;color:#374151;border-bottom:2px solid #e5e7eb;white-space:nowrap;user-select:none}
th[data-col]{cursor:pointer}
th[data-col]:hover{background:#f0f4f8}
.si::after{content:" ↕";color:#d1d5db}
.sa::after{content:" ↑";color:#3b82f6}
.sd::after{content:" ↓";color:#3b82f6}
td{padding:.55rem .9rem;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.dr:hover td{background:#fafafa;cursor:pointer}
.dr.exp td{background:#eff6ff}
.dr.exp td:first-child{border-left:3px solid #3b82f6;padding-left:.65rem}
.dtr td{padding:0}
.di{padding:.9rem 1.25rem;background:#f8fafc;border-bottom:1px solid #e5e7eb}
.ic{font-family:ui-monospace,monospace;color:#2563eb;font-weight:600;font-size:.82rem;white-space:nowrap}
.nc{font-weight:500}
.fc{font-family:ui-monospace,monospace;color:#7c3aed;font-size:.82rem}
.mc{font-family:ui-monospace,monospace;font-size:.82rem;text-align:right;white-space:nowrap}
.tags{display:flex;flex-wrap:wrap;gap:.2rem;max-width:220px}
.tag{border-radius:.3rem;padding:.1rem .4rem;font-size:.72rem;white-space:nowrap;border:1px solid;line-height:1.4}
.tb0{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.tg0{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
.tp0{background:#faf5ff;color:#6d28d9;border-color:#ddd6fe}
.to0{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
.tgr{background:#f9fafb;color:#6b7280;border-color:#e5e7eb}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:.65rem;margin-bottom:.5rem}
.dl{font-size:.72rem;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.2rem}
.dv{font-size:.84rem;color:#1a202c;word-break:break-word}
.mono{font-family:ui-monospace,monospace;font-size:.85em}
.st{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:.5rem;border:1px solid #e5e7eb}
.st th{background:#f1f5f9;padding:.35rem .65rem;text-align:left;font-weight:600;color:#374151;border-bottom:1px solid #e5e7eb}
.st td{padding:.3rem .65rem;border-bottom:1px solid #f1f5f9}
.st tr:last-child td{border-bottom:none}
.nr{text-align:center;padding:2.5rem;color:#9ca3af}
@media(max-width:640px){header{padding:1rem}.hi{flex-direction:column}main{padding:0 .5rem}}
</style>
</head>
<body>
<header>
  <div class="hi">
    <div>
      <h1>unimodpy</h1>
      <p class="sub">UNIMOD mass spectrometry modifications database</p>
      <div class="hm">
        <span class="ct" id="ec">loading…</span>
        <a class="pl" href="https://pypi.org/project/unimodpy/" target="_blank" rel="noopener">PyPI</a>
        <a class="pl" href="https://github.com/tacular-omics/unimodpy" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
    <nav class="rel">
      <span>Related:</span>
      <a href="https://tacular-omics.github.io/uniprotptmpy/">uniprotptmpy</a>
      <a href="https://tacular-omics.github.io/psimodpy/">psimodpy</a>
    </nav>
  </div>
</header>
<main>
  <div class="tb">
    <input type="search" id="q" placeholder="Search name, ID, formula, synonym…" autocomplete="off">
    <select id="fc"><option value="">All classifications</option></select>
    <select id="fs"><option value="">All sites</option></select>
    <select id="fp"><option value="">All positions</option></select>
  </div>
  <div class="bar">
    <span class="rc" id="rc">Loading…</span>
    <div class="pc">
      <select id="pp"><option value="50">50/page</option><option value="100">100/page</option><option value="250">250/page</option><option value="0">All</option></select>
      <button id="pv" disabled>‹</button>
      <span class="pi" id="pi"></span>
      <button id="nx" disabled>›</button>
    </div>
  </div>
  <div class="tw">
    <table>
      <thead><tr>
        <th data-col="id"><span class="si">ID</span></th>
        <th data-col="name"><span class="si">Name</span></th>
        <th>Formula</th>
        <th data-col="delta_mono_mass" style="text-align:right"><span class="si">Mono Mass (Da)</span></th>
        <th>Sites</th>
        <th>Classifications</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>
<script>
'use strict';
let ALL=[],filtered=[],sortCol='id',sortDir=1,page=0,perPage=50;
const CC={
  'Post-translational':'tg0','Co-translational':'tg0','Pre-translational':'tb0',
  'Chemical derivative':'to0','Isotopic label':'to0',
  'N-linked glycosylation':'tp0','O-linked glycosylation':'tp0','Other glycosylation':'tp0',
  'Artefact':'tgr','AA substitution':'tgr','Multiple':'tgr','Other':'tgr',
  'Non-standard residue':'tgr','Synth. pep. protect. gp.':'tgr'
};
async function init(){
  const r=await fetch('data.json');
  ALL=await r.json();
  document.getElementById('ec').textContent=ALL.length+' entries';
  const cls=new Set,sites=new Set,pos=new Set;
  for(const e of ALL)for(const s of e.specificities){cls.add(s.classification);sites.add(s.site);pos.add(s.position);}
  fill('fc',[...cls].sort());fill('fs',[...sites].sort());fill('fp',[...pos].sort());
  update();
}
function fill(id,vals){const s=document.getElementById(id);vals.forEach(v=>{const o=document.createElement('option');o.value=o.textContent=v;s.appendChild(o);});}
function update(){page=0;applyFilters();applySort();render();}
function applyFilters(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const fc=document.getElementById('fc').value,fs=document.getElementById('fs').value,fp=document.getElementById('fp').value;
  filtered=ALL.filter(e=>{
    if(q){const h=`unimod:${e.id} ${e.name} ${e.proforma_formula||''} ${(e.synonyms||[]).join(' ')} ${e.definition||''}`.toLowerCase();if(!h.includes(q))return false;}
    if(fc||fs||fp){if(!e.specificities.some(s=>(!fc||s.classification===fc)&&(!fs||s.site===fs)&&(!fp||s.position===fp)))return false;}
    return true;
  });
}
function applySort(){
  filtered.sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(av==null)av=sortCol==='delta_mono_mass'?Infinity:'';
    if(bv==null)bv=sortCol==='delta_mono_mass'?Infinity:'';
    return(typeof av==='number'?(av-bv):String(av).localeCompare(String(bv)))*sortDir;
  });
}
function getPage(){if(!perPage)return filtered;return filtered.slice(page*perPage,(page+1)*perPage);}
function render(){
  const tbody=document.getElementById('tbody');
  const rows=getPage();
  if(!rows.length){tbody.innerHTML='<tr><td colspan="6" class="nr">No entries match your search.</td></tr>';updateBar();return;}
  tbody.innerHTML='';
  for(const e of rows){
    const tr=document.createElement('tr');tr.className='dr';
    const sites=[...new Set(e.specificities.map(s=>s.site))];
    const cls=[...new Set(e.specificities.map(s=>s.classification))];
    tr.innerHTML=`<td class="ic">UNIMOD:${e.id}</td>
<td class="nc">${x(e.name)}</td>
<td class="fc">${e.proforma_formula?`<code>${x(e.proforma_formula)}</code>`:'<span style="color:#d1d5db">—</span>'}</td>
<td class="mc">${e.delta_mono_mass!=null?e.delta_mono_mass.toFixed(6):'<span style="color:#d1d5db">—</span>'}</td>
<td><div class="tags">${sites.map(s=>`<span class="tag tb0">${x(s)}</span>`).join('')||'<span style="color:#d1d5db">—</span>'}</div></td>
<td><div class="tags">${cls.map(c=>`<span class="tag ${CC[c]||'tb0'}">${x(c)}</span>`).join('')||'<span style="color:#d1d5db">—</span>'}</div></td>`;
    tr.addEventListener('click',()=>toggle(tr,e));
    tbody.appendChild(tr);
  }
  updateBar();
}
function toggle(tr,e){
  const nx=tr.nextElementSibling;
  if(nx&&nx.classList.contains('dtr')){nx.remove();tr.classList.remove('exp');return;}
  document.querySelectorAll('.dr.exp').forEach(r=>{r.classList.remove('exp');const n=r.nextElementSibling;if(n&&n.classList.contains('dtr'))n.remove();});
  tr.classList.add('exp');
  const d=document.createElement('tr');d.className='dtr';
  d.innerHTML=`<td colspan="6"><div class="di">${detail(e)}</div></td>`;
  tr.after(d);
}
function detail(e){
  const syns=(e.synonyms||[]).length?e.synonyms.map(x).join(', '):'—';
  const specRows=e.specificities.map(s=>`<tr>
<td>${s.spec_num!=null?s.spec_num:''}</td>
<td><span class="tag tb0">${x(s.site)}</span></td>
<td>${x(s.position)}</td>
<td><span class="tag ${CC[s.classification]||'tb0'}">${x(s.classification)}</span></td>
</tr>`).join('');
  return `<div class="dg">
<div><div class="dl">Definition</div><div class="dv">${x(e.definition||'—')}</div></div>
<div><div class="dl">Synonyms</div><div class="dv">${syns}</div></div>
<div><div class="dl">Average Mass</div><div class="dv mono">${e.delta_avge_mass!=null?e.delta_avge_mass.toFixed(4)+' Da':'—'}</div></div>
${e.comment?`<div><div class="dl">Comment</div><div class="dv">${x(e.comment)}</div></div>`:''}
${e.approved!=null?`<div><div class="dl">Approved</div><div class="dv">${e.approved?'Yes':'No'}</div></div>`:''}
</div>${e.specificities.length?`<div style="margin-top:.75rem"><div class="dl">Specificities (${e.specificities.length})</div>
<table class="st"><thead><tr><th>#</th><th>Site</th><th>Position</th><th>Classification</th></tr></thead>
<tbody>${specRows}</tbody></table></div>`:''}`;}
function updateBar(){
  const t=filtered.length,tp=perPage?Math.ceil(t/perPage):1;
  const s=t?page*perPage+1:0,e2=perPage?Math.min((page+1)*perPage,t):t;
  document.getElementById('rc').textContent=t===0?'No entries found':`Showing ${s}–${e2} of ${t} entries`;
  document.getElementById('pi').textContent=perPage&&tp>1?`${page+1}/${tp}`:'';
  document.getElementById('pv').disabled=page===0;
  document.getElementById('nx').disabled=!perPage||page>=tp-1;
  document.querySelectorAll('th[data-col]').forEach(th=>{
    const sp=th.querySelector('span');if(sp)sp.className=th.dataset.col===sortCol?(sortDir===1?'sa':'sd'):'si';
  });
}
function x(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let dt;
document.getElementById('q').addEventListener('input',()=>{clearTimeout(dt);dt=setTimeout(update,200);});
['fc','fs','fp'].forEach(id=>document.getElementById(id).addEventListener('change',update));
document.getElementById('pp').addEventListener('change',e=>{perPage=+e.target.value;page=0;render();});
document.getElementById('pv').addEventListener('click',()=>{if(page>0){page--;render();}});
document.getElementById('nx').addEventListener('click',()=>{if(perPage&&page<Math.ceil(filtered.length/perPage)-1){page++;render();}});
document.querySelectorAll('th[data-col]').forEach(th=>{th.addEventListener('click',()=>{
  const c=th.dataset.col;sortDir=sortCol===c?-sortDir:1;sortCol=c;applySort();render();
});});
init().catch(e=>{document.getElementById('tbody').innerHTML=`<tr><td colspan="6" class="nr">Error loading data: ${x(e.message)}</td></tr>`;document.getElementById('rc').textContent='Error';});
</script>
</body>
</html>
